# ============================================================================
# الإعدادات الأساسية للمشروع
# ============================================================================
name = "kollobeit3alem-api"
main = "src/_worker.js"
compatibility_date = "2024-03-01"

# ============================================================================
# المتغيرات البيئية
# JWT_SECRET و ALLOWED_ORIGINS يُضافان من لوحة تحكم Cloudflare للأمان
# ============================================================================
[vars]
ENVIRONMENT = "production"
# ALLOWED_ORIGINS = "https://kollobeit3alem.pages.dev,https://kollobeit3alem.com"
# ↑ أضف هذا السطر وعدّله من لوحة التحكم Settings > Variables عند تغيير الدومين

# ============================================================================
# 1. ربط قاعدة البيانات (D1 Database)
# ============================================================================
[[d1_databases]]
binding = "DB"
database_name = "kollobeit3alem-db"
database_id = "71570892-e00b-47f8-8113-e46ed27b845b"
# التحسين: تفعيل Read Replication — يوزع القراءات على nodes متعددة (مجاني في beta)
read_replication = { mode = "auto" }

# ============================================================================
# 2. ربط KV Cache — يُستخدم الآن لـ 4 أغراض:
#    - كاش الكورسات (all_courses)
#    - جلسات المستخدمين (session:{userId})
#    - Rate Limiting (rate_limit:charge:{userId})
#    - مفاتيح Google العامة (google_jwks)
# ============================================================================
[[kv_namespaces]]
binding = "COURSES_CACHE"
id = "94b10873bf82473b8a553e985d8352ee"

# ============================================================================
# 3. ربط طابور الامتحانات (Queues)
# ============================================================================
[[queues.producers]]
queue = "exams-queue"
binding = "EXAMS_QUEUE"

[[queues.consumers]]
queue = "exams-queue"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 3
