# ============================================================================
# الإعدادات الأساسية للمشروع (Basic Configuration)
# ============================================================================
name = "kollobeit3alem-api" # اسم المشروع بتاعك على كلاود فلير (تقدر تغيره)
main = "src/_worker.js"     # مسار الملف الرئيسي اللي بيشغل السيرفر
compatibility_date = "2024-03-01" # تاريخ إصدار التوافق (سيبه زي ما هو)

# ============================================================================
# المتغيرات البيئية (Environment Variables)
# ملاحظة: الـ JWT_SECRET لا يوضع هنا للأمان، بل يضاف من لوحة تحكم كلاود فلير
# ============================================================================
[vars]
ENVIRONMENT = "production"

# ============================================================================
# 1. ربط قاعدة البيانات (D1 Database Binding)
# ============================================================================
[[d1_databases]]
binding = "DB" # الاسم البرمجي اللي بنستخدمه في الكود (env.DB)
database_name = "kollobeit3alem-db" # اسم الداتا بيز بتاعتك
database_id = "71570892-e00b-47f8-8113-e46ed27b845b" # ⚠️ ضَع هنا الـ ID الخاص بالداتا بيز من لوحة التحكم

# ============================================================================
# 2. ربط مساحة الكاش (KV Namespace Binding) للكورسات
# ============================================================================
[[kv_namespaces]]
binding = "COURSES_CACHE" # الاسم البرمجي اللي هنستخدمه في الكود (env.COURSES_CACHE)
id = "94b10873bf82473b8a553e985d8352ee" # ⚠️ ضَع هنا الـ ID الخاص بالـ KV من لوحة التحكم

# ============================================================================
# 3. ربط طابور الانتظار (Queues Bindings) للامتحانات
# ============================================================================

# أ. المُرسل (Producer): ده اللي بيسمح لـ student.js يرمي الامتحانات في الطابور
[[queues.producers]]
queue = "exams-queue" # اسم الطابور اللي عملناه على كلاود فلير
binding = "EXAMS_QUEUE" # الاسم البرمجي في الكود (env.EXAMS_QUEUE)

# ب. المُستقبل (Consumer): ده اللي بيسحب الامتحانات من الطابور عشان يصححها في الخلفية
[[queues.consumers]]
queue = "exams-queue" # اسم الطابور
max_batch_size = 50   # السيرفر هيسحب 50 امتحان بحد أقصى في الدفعة الواحدة (عشان ميضغطش الداتا بيز)
max_batch_timeout = 5 # السيرفر هيستنى 5 ثواني يجمع فيهم الـ 50 امتحان قبل ما يصححهم
max_retries = 3       # لو حصل خطأ في التصحيح، هيحاول يعيد العملية 3 مرات قبل ما يعتبرها فاشلة
