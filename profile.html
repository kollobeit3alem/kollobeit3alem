<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي الشخصي | كله بيتعلم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        i, .fas, .fab, .far {
    font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
}
        /* تعريف الخط الخاص بالمنصة */
        @font-face {
            font-family: 'AbdoLogo';
            src: url('alfont_com_Abdo.Fonts_Abdo.Logo_.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #015669; 
            --primary-light: rgba(1, 86, 105, 0.1);
            --bg-page: #f4f7f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AbdoLogo', sans-serif !important;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- الهيدر (Header) --- */
        header {
            background-color: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--primary);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .brand img { height: 50px; border-radius: 12px; }
        .brand h1 { font-size: 24px; color: var(--primary); }

        .header-links { display: flex; gap: 20px; align-items: center; }
        
        .btn-browse {
            background: var(--primary-light); color: var(--primary);
            text-decoration: none; padding: 10px 20px; border-radius: 12px;
            font-weight: bold; transition: var(--transition);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-browse:hover { background: var(--primary); color: white; }

        .btn-logout {
            background: #fee2e2; color: #ef4444; border: none;
            padding: 10px 15px; border-radius: 12px; cursor: pointer;
            font-weight: bold; transition: var(--transition);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-logout:hover { background: #ef4444; color: white; }

        /* --- القسم الشخصي (Profile Hero) --- */
        .profile-hero {
            background: linear-gradient(135deg, var(--primary) 0%, #013d4a 100%);
            padding: 40px 5%;
            display: flex;
            align-items: center;
            gap: 30px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .profile-hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg opacity="0.05" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="white"/></svg>') repeat;
            background-size: 200px; z-index: 0;
        }

        .profile-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover; z-index: 1; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .profile-info { z-index: 1; position: relative; }
        .profile-info h2 { font-size: 32px; margin-bottom: 5px; }
        .profile-info p { font-size: 16px; opacity: 0.8; margin-bottom: 15px; }

        /* --- كروت الإحصائيات --- */
        .stats-container {
            display: flex; gap: 20px; margin-top: -30px; padding: 0 5%;
            position: relative; z-index: 10;
        }
        .stat-card {
            background: var(--white); flex: 1; padding: 25px; border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid var(--border);
            display: flex; align-items: center; gap: 20px;
        }
        .stat-icon {
            width: 60px; height: 60px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; flex-shrink: 0;
        }
        .stat-icon.courses { background: #e0f2fe; color: #0284c7; }
        .stat-icon.lessons { background: #d1fae5; color: #059669; }
        
        .stat-data h4 { color: var(--text-muted); font-size: 14px; margin-bottom: 5px; }
        .stat-data span { font-size: 28px; font-weight: bold; color: var(--text-main); }

        /* --- شبكة كورساتي --- */
        .main-container { padding: 50px 5%; flex: 1; }
        .section-title { font-size: 26px; color: var(--text-main); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--primary); }

        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        .course-card {
            background: var(--white); border-radius: var(--radius); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition); display: flex; flex-direction: column;
        }
        .course-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(1, 86, 105, 0.15); border-color: var(--primary); }

        .course-img-wrapper { position: relative; width: 100%; height: 180px; background: #e2e8f0; }
        .course-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .course-content { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .course-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 15px; line-height: 1.4; }

        /* شريط التقدم */
        .progress-wrapper { margin-bottom: 20px; flex: 1;}
        .progress-header { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; font-weight: bold;}
        .progress-bar-bg { width: 100%; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--success); border-radius: 5px; transition: width 1s ease-in-out; }

        .btn-continue {
            background: var(--primary-light); color: var(--primary);
            padding: 12px; border-radius: 12px; font-weight: bold; font-size: 15px;
            transition: var(--transition); display: flex; justify-content: center; align-items: center; gap: 8px;
            text-decoration: none; border: none; cursor: pointer; width: 100%;
        }
        .btn-continue:hover { background: var(--primary); color: white; }
        
        .btn-completed { background: var(--success-light); color: var(--success); }
        .btn-completed:hover { background: var(--success); color: white; }

        /* لودنج أنيميشن */
        .loading-container { text-align: center; padding: 50px; color: var(--text-muted); grid-column: 1 / -1; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--primary-light); border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer { background: var(--white); text-align: center; padding: 25px; border-top: 1px solid var(--border); color: var(--text-muted); margin-top: auto; }

        @media (max-width: 768px) {
            .profile-hero { flex-direction: column; text-align: center; }
            .stats-container { flex-direction: column; margin-top: 20px; }
            .header-links .btn-browse span { display: none; } /* إخفاء نص الزر في الموبايل */
        }
    </style>
</head>
<body>

    <header>
        <a href="/courses.html" class="brand">
            <img src="كله بيتعلم (1).png" alt="شعار المنصة">
            <h1>كله بيتعلم</h1>
        </a>
        <div class="header-links">
            <a href="/courses.html" class="btn-browse"><i class="fas fa-compass"></i> <span>تصفح الدورات</span></a>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <section class="profile-hero">
        <img src="https://via.placeholder.com/150" id="profile-img" class="profile-avatar" alt="الصورة الشخصية">
        <div class="profile-info">
            <h2 id="profile-name">جاري التحميل...</h2>
            <p id="profile-email">...</p>
            <span style="background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 14px;">
                <i class="fas fa-graduation-cap"></i> طالب مجتهد
            </span>
        </div>
    </section>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon courses"><i class="fas fa-book-open"></i></div>
            <div class="stat-data">
                <h4>الدورات المشترك بها</h4>
                <span id="stat-courses">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon lessons"><i class="fas fa-check-double"></i></div>
            <div class="stat-data">
                <h4>المحاضرات المكتملة</h4>
                <span id="stat-lessons">0</span>
            </div>
        </div>
    </div>

    <main class="main-container">
        <h2 class="section-title"><i class="fas fa-laptop-code"></i> مساحة التعلم الخاصة بي</h2>
        
        <div class="courses-grid" id="my-courses-grid">
            <div class="loading-container">
                <div class="spinner"></div>
                <h3>جاري تحميل دوراتك...</h3>
            </div>
        </div>
    </main>

    <footer>
        جميع الحقوق محفوظة لمنصة كله بيتعلم &copy; 2026
    </footer>

    <script>
        const workerBaseUrl = 'https://kollobeit3alem.pages.dev';

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('auth_token');
            const userInfoStr = localStorage.getItem('user_info');

            if (!token || !userInfoStr) {
                window.location.href = '/';
                return;
            }

            const userInfo = JSON.parse(userInfoStr);
            document.getElementById('profile-name').innerText = userInfo.name;
            document.getElementById('profile-email').innerText = userInfo.email;
            
            if (userInfo.avatar_url) {
                document.getElementById('profile-img').src = userInfo.avatar_url;
            }

            fetchDashboardData(token);
        });

        async function fetchDashboardData(token) {
            const grid = document.getElementById('my-courses-grid');

            try {
                // سنقوم بإنشاء هذا المسار في السيرفر في الخطوة القادمة
                const response = await fetch(`${workerBaseUrl}/api/my-dashboard`, {
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch dashboard data');
                
                const data = await response.json();
                
                // تحديث الإحصائيات العلوية
                document.getElementById('stat-courses').innerText = data.stats.totalCourses;
                document.getElementById('stat-lessons').innerText = data.stats.completedLessons;

                grid.innerHTML = '';

                if (data.enrolledCourses.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 50px; background: white; border-radius: 20px; border: 1px solid var(--border);">
                            <i class="fas fa-folder-open" style="font-size: 50px; color: #cbd5e1; margin-bottom: 20px;"></i>
                            <h3 style="color: var(--text-muted); margin-bottom: 15px;">لم تشترك في أي دورة حتى الآن.</h3>
                            <a href="/courses.html" class="btn-continue" style="display: inline-flex; width: auto; padding: 10px 30px;">تصفح الدورات المتاحة</a>
                        </div>
                    `;
                    return;
                }

                // رسم الكورسات مع شريط التقدم
                data.enrolledCourses.forEach(course => {
                    const imageUrl = course.image_url || 'https://via.placeholder.com/600x400/015669/FFFFFF?text=دورة';
                    
                    // حساب النسبة المئوية
                    let progressPercent = 0;
                    if (course.total_lessons > 0) {
                        progressPercent = Math.round((course.completed_lessons / course.total_lessons) * 100);
                    }
                    if (progressPercent > 100) progressPercent = 100; // للأمان

                    const isCompleted = progressPercent === 100 && course.total_lessons > 0;
                    const btnClass = isCompleted ? 'btn-completed' : '';
                    const btnText = isCompleted ? 'مراجعة الدورة <i class="fas fa-check-circle"></i>' : 'متابعة التعلم <i class="fas fa-play-circle"></i>';

                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.innerHTML = `
                        <div class="course-img-wrapper">
                            <img src="${imageUrl}" alt="${course.title}">
                        </div>
                        <div class="course-content">
                            <h3 class="course-title">${course.title}</h3>
                            
                            <div class="progress-wrapper">
                                <div class="progress-header">
                                    <span>مستوى الإنجاز</span>
                                    <span style="color: ${isCompleted ? 'var(--success)' : 'var(--primary)'}">${progressPercent}%</span>
                                </div>
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: 0%;" data-target-width="${progressPercent}%"></div>
                                </div>
                                <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">
                                    أكملت ${course.completed_lessons} من أصل ${course.total_lessons} محاضرات
                                </div>
                            </div>

                            <a href="/course.html?id=${course.id}" class="btn-continue ${btnClass}">
                                ${btnText}
                            </a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // تفعيل أنيميشن شريط التقدم بعد الرسم
                setTimeout(() => {
                    document.querySelectorAll('.progress-bar-fill').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-target-width');
                    });
                }, 100);

            } catch (error) {
                console.error(error);
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--danger);">
                        <i class="fas fa-exclamation-triangle" style="font-size: 40px; margin-bottom: 15px;"></i>
                        <h3>عذراً، حدث خطأ أثناء تحميل بياناتك.</h3>
                    </div>
                `;
            }
        }

        function logout() {
            if (confirm('هل تريد تسجيل الخروج حقاً؟')) {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user_info');
                window.location.href = '/';
            }
        }
    </script>

</body>
</html>
