<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - كله بيتعلم لتعلم المهارات</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        /* تعريف الخط الخاص بالمنصة */
        @font-face {
            font-family: 'AbdoLogo';
            src: url('alfont_com_Abdo.Fonts_Abdo.Logo_.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* متغيرات الألوان (تقدر تغير اللون الأساسي هنا عشان يتطابق مع الشعار 100%) */
        :root {
            --primary-color: #2563eb; /* غير هذا اللون ليتطابق مع لون الشعار الأساسي */
            --primary-light: rgba(37, 99, 235, 0.1);
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); 
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --card-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }

        /* تطبيق الهوية البصرية والخط على كامل الصفحة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AbdoLogo', sans-serif !important;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* لضمان نزول الفوتر للأسفل */
            justify-content: space-between;
            align-items: center;
        }

        /* حاوية تسجيل الدخول في المنتصف */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color); /* خط علوي يعطي هوية بصرية قوية */
            position: relative;
            overflow: hidden;
        }

        /* تأثير إضاءة خفيف خلف اللوجو */
        .login-card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: var(--primary-light);
            filter: blur(40px);
            z-index: 0;
            border-radius: 50%;
        }

        .platform-identity {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1; /* ليكون فوق الإضاءة */
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .platform-name {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: -5px;
        }

        .tagline {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 10px;
            z-index: 1;
        }

        .login-separator {
            width: 100%;
            height: 1px;
            background-color: #e2e8f0;
            margin: 15px 0;
            position: relative;
        }

        /* كلمة "أو" في منتصف الفاصل */
        .login-separator::after {
            content: 'ابدأ الآن';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--card-bg);
            padding: 0 15px;
            color: var(--text-muted);
            font-size: 13px;
        }

        #g_id_signin_wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1;
            margin-top: 10px;
        }

        /* تصميم الفوتر */
        footer {
            width: 100%;
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        footer .footer-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            margin: 0 5px;
            transition: color 0.3s;
        }

        footer .footer-link:hover {
            text-decoration: underline;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="platform-identity">
                <img src="كله بيتعلم (1).png" alt="شعار كله بيتعلم" class="logo-img">
                <h1 class="platform-name">كله بيتعلم لتعلم المهارات</h1>
            </div>

            <p class="tagline">منصتك المتكاملة لإتقان المهارات العملية بيسر.</p>
            
            <div class="login-separator"></div>

            <div id="g_id_onload"
                 data-client_id="543687035134-d64j2ncr5bcfuv7s9e61psp7qb2dj276.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>

            <div id="g_id_signin_wrapper">
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="center">
                </div>
            </div>

        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة لمنصة كله بيتعلم &copy; 2026 
        | 
        <a href="https://adham-protofoilo.vercel.app" class="footer-link" target="_blank">اضغط هنا للمزيد</a>
    </footer>

    <script>
        async function handleGoogleLogin(response) {
            // استبدل الرابط أدناه برابط الـ Worker الخاص بك عند النشر
            const workerUrl = 'https://your-worker-name.your-subdomain.workers.dev/api/auth/google';

            try {
                const apiResponse = await fetch(workerUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ credential: response.credential })
                });

                const data = await apiResponse.json();

                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    window.location.href = '/courses.html';
                } else {
                    alert('عذراً، فشل تسجيل الدخول. تأكد من إعدادات الـ Worker وقاعدة البيانات.');
                }
            } catch (error) {
                console.error('Connection Error:', error);
                alert('خطأ في الاتصال بالسيرفر. يرجى مراجعة حالة الـ Worker.');
            }
        }
    </script>

</body>
</html>
