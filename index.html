<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>صفحة عشوائية</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6dd5ed, #2193b0);
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
    }

    header {
        background: rgba(0,0,0,0.3);
        padding: 20px;
    }

    section {
        padding: 40px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: orange;
        cursor: pointer;
    }

    button:hover {
        background: darkorange;
    }

    ul {
        list-style: none;
        padding: 0;
    }

    li {
        background: rgba(255,255,255,0.2);
        margin: 10px;
        padding: 10px;
        border-radius: 6px;
    }
</style>
</head>

<body>

<header>
    <h1>مرحبا بك في صفحة عشوائية 🌍</h1>
</header>

<section>
    <p>دي مجرد صفحة HTML بسيطة للتجربة والتعلم.</p>

    <img src="https://picsum.photos/300" alt="صورة عشوائية">

    <br><br>

    <button onclick="alert('أهلاً بيك!')">اضغط هنا</button>

    <h2>حاجات عشوائية:</h2>
    <ul>
        <li>برمجة</li>
        <li>تصميم</li>
        <li>تكنولوجيا</li>
        <li>ذكاء اصطناعي</li>
    </ul>
</section>

</body>
</html>
