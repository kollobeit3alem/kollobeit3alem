<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدورات التدريبية | كله بيتعلم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* تعريف الخط الخاص بالمنصة */
        @font-face {
            font-family: 'AbdoLogo';
            src: url('alfont_com_Abdo.Fonts_Abdo.Logo_.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary: #015669; 
            --primary-light: rgba(1, 86, 105, 0.1);
            --bg-page: #f4f7f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'AbdoLogo', sans-serif !important;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- الهيدر (Header) --- */
        header {
            background-color: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--primary);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .brand img {
            height: 50px;
            border-radius: 12px;
        }

        .brand h1 {
            font-size: 24px;
            color: var(--primary);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: var(--text-main);
            background: var(--bg-page);
            padding: 5px 15px 5px 5px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }

        .user-profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .btn-logout {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white;
        }

        /* --- قسم الترحيب (Hero Section) --- */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #013d4a 100%);
            color: white;
            padding: 60px 5%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg opacity="0.05" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="white"/></svg>') repeat;
            background-size: 200px;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero h2 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- شبكة الكورسات (Courses Grid) --- */
        .main-container {
            padding: 50px 5%;
            flex: 1;
        }

        .section-title {
            font-size: 28px;
            color: var(--text-main);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .course-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(1, 86, 105, 0.15);
            border-color: var(--primary);
        }

        .course-img-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #e2e8f0;
        }

        .course-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .course-card:hover .course-img-wrapper img {
            transform: scale(1.05);
        }

        .course-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .course-content {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .course-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .course-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .btn-start {
            background: var(--primary-light);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .course-card:hover .btn-start {
            background: var(--primary);
            color: white;
        }

        /* لودنج أنيميشن (شاشة تحميل) */
        .loading-container {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--primary-light);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* الفوتر */
        footer {
            background: var(--white);
            text-align: center;
            padding: 25px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand">
            <img src="كله بيتعلم (1).png" alt="شعار المنصة">
            <h1>كله بيتعلم</h1>
        </a>
        <div class="user-actions">
            <div class="user-profile">
                <span id="header-user-name">جاري التحميل...</span>
                <img src="" id="header-user-img" alt="صورة المستخدم" style="display: none;">
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> خروج
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2 id="hero-welcome">مرحباً بك في منصة كله بيتعلم!</h2>
            <p>اختر الدورة التي تناسب شغفك وابدأ رحلة التعلم واكتساب المهارات العملية الآن.</p>
        </div>
    </section>

    <main class="main-container">
        <h2 class="section-title"><i class="fas fa-compass"></i> استكشف الدورات المتاحة</h2>
        
        <div class="courses-grid" id="courses-grid">
            <div class="loading-container">
                <div class="spinner"></div>
                <h3>جاري تحميل أحدث الدورات...</h3>
            </div>
        </div>
    </main>

    <footer>
        جميع الحقوق محفوظة لمنصة كله بيتعلم &copy; 2026
    </footer>

    <script>
        const workerBaseUrl = 'https://kollobeit3alem.pages.dev';

        // 1. التحقق من تسجيل الدخول فور فتح الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('auth_token');
            const userInfoStr = localStorage.getItem('user_info');

            // لو مفيش توكن، اطرده لصفحة تسجيل الدخول
            if (!token || !userInfoStr) {
                window.location.href = '/';
                return;
            }

            // عرض بيانات الطالب في الهيدر والترحيب
            const userInfo = JSON.parse(userInfoStr);
            document.getElementById('header-user-name').innerText = userInfo.name.split(' ')[0]; // عرض الاسم الأول فقط لجمال الشكل
            document.getElementById('hero-welcome').innerText = `أهلاً بك يا ${userInfo.name}! مستعد تتعلم حاجة جديدة؟`;
            
            if (userInfo.avatar_url) {
                const img = document.getElementById('header-user-img');
                img.src = userInfo.avatar_url;
                img.style.display = 'block';
            }

            // جلب الكورسات
            fetchCourses();
        });

        // 2. دالة جلب الكورسات من الـ Worker
        async function fetchCourses() {
            const grid = document.getElementById('courses-grid');

            try {
                const response = await fetch(`${workerBaseUrl}/api/courses`, {
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Network response was not ok');
                
                const courses = await response.json();
                
                // تفريغ شاشة التحميل
                grid.innerHTML = '';

                if (courses.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 50px; background: white; border-radius: 20px;">
                            <i class="fas fa-box-open" style="font-size: 50px; color: #cbd5e1; margin-bottom: 20px;"></i>
                            <h3 style="color: var(--text-muted);">لا توجد دورات متاحة حالياً. سيتم إضافة محتوى قريباً!</h3>
                        </div>
                    `;
                    return;
                }

                // رسم الكروت لكل كورس
                courses.forEach(course => {
                    const card = document.createElement('a');
                    card.href = `/course.html?id=${course.id}`;
                    card.className = 'course-card';
                    
                    // لو المدرس محطش صورة، نحط صورة افتراضية شيك
                    const imageUrl = course.image_url || 'https://via.placeholder.com/600x400/015669/FFFFFF?text=كورس+جديد';

                    card.innerHTML = `
                        <div class="course-img-wrapper">
                            <span class="course-badge">جديد</span>
                            <img src="${imageUrl}" alt="${course.title}">
                        </div>
                        <div class="course-content">
                            <h3 class="course-title">${course.title}</h3>
                            <p class="course-desc">${course.description || 'دورة تدريبية متميزة لتطوير مهاراتك العملية.'}</p>
                            <div class="course-footer">
                                <span class="btn-start">
                                    ابدأ الآن <i class="fas fa-arrow-left"></i>
                                </span>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching courses:', error);
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--danger);">
                        <i class="fas fa-exclamation-circle" style="font-size: 40px; margin-bottom: 15px;"></i>
                        <h3>عذراً، حدث خطأ أثناء تحميل الدورات. يرجى تحديث الصفحة.</h3>
                    </div>
                `;
            }
        }

        // 3. دالة تسجيل الخروج
        function logout() {
            if (confirm('هل تريد تسجيل الخروج حقاً؟')) {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user_info');
                window.location.href = '/';
            }
        }
    </script>

</body>
</html>
