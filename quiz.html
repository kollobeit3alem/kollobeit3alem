<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحان المحاضرة | كله بيتعلم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'AbdoLogo';
            src: url('alfont_com_Abdo.Fonts_Abdo.Logo_.ttf') format('truetype');
        }

        :root {
            --primary: #015669; 
            --primary-light: rgba(1, 86, 105, 0.1);
            --bg-page: #f4f7f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'AbdoLogo', sans-serif !important; }
        body { background-color: var(--bg-page); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background-color: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); border-bottom: 3px solid var(--primary); z-index: 10;
        }
        .brand { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .brand img { height: 45px; border-radius: 10px; }
        .brand h1 { font-size: 22px; color: var(--primary); }
        .btn-back { background: var(--primary-light); color: var(--primary); padding: 10px 20px; border-radius: 12px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-back:hover { background: var(--primary); color: white; }

        .quiz-container { max-width: 900px; margin: 20px auto; padding: 0 20px; flex: 1; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
        
        .quiz-card { background: var(--white); border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; flex: 1; overflow: hidden; margin-bottom: 20px; }
        
        .quiz-header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
        .quiz-header h2 { color: var(--primary); font-size: 22px; }
        .quiz-timer { font-size: 18px; font-weight: bold; color: var(--danger); background: white; padding: 8px 15px; border-radius: 10px; border: 2px solid var(--danger); display: flex; align-items: center; gap: 8px; }

        .quiz-progress { padding: 10px 30px; background: var(--primary-light); color: var(--primary); font-weight: bold; font-size: 16px; border-bottom: 1px solid var(--border); text-align: center; }

        .quiz-scroll-area { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .quiz-scroll-area::-webkit-scrollbar { width: 8px; }
        .quiz-scroll-area::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .quiz-scroll-area::-webkit-scrollbar-thumb:hover { background-color: var(--primary); }

        .question-image { max-width: 100%; max-height: 350px; object-fit: contain; border-radius: 15px; margin-bottom: 30px; border: 2px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 700px; }
        .opt-btn { background: var(--bg-page); border: 2px solid var(--border); padding: 15px; border-radius: 12px; font-size: 18px; color: var(--text-main); cursor: pointer; transition: 0.3s; font-weight: bold; display: flex; align-items: center; justify-content: flex-start; gap: 15px; text-align: right; }
        .opt-btn .letter { background: var(--white); width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--primary); flex-shrink: 0;}
        
        .opt-btn:hover { border-color: var(--primary); background: var(--primary-light); }
        .opt-btn.selected { border-color: var(--primary); background: var(--primary); color: white; transform: scale(1.02); box-shadow: 0 5px 15px rgba(1, 86, 105, 0.3);}
        .opt-btn.selected .letter { color: var(--text-main); }
        
        .quiz-footer { padding: 20px 30px; border-top: 1px solid var(--border); background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-btn { background: white; color: var(--text-main); border: 2px solid var(--border); padding: 12px 25px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-btn:hover { background: var(--border); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .submit-btn { background: var(--success); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); display: none; align-items: center; gap: 10px; }
        .submit-btn:hover { background: #0ea5e9; transform: translateY(-2px); }

        .result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 20px; text-align: center; }
        .result-circle { width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 45px; color: white; margin-bottom: 25px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .result-circle.pass { background: var(--success); }
        .result-circle.fail { background: var(--danger); }
        .result-title { font-size: 28px; font-weight: bold; margin-bottom: 15px; }
        .result-details { font-size: 20px; color: var(--text-sec); margin-bottom: 40px; }

        .loader-container { display: flex; flex-direction: column; justify-content: center; align-items: center; flex: 1; color: var(--primary); font-size: 24px; gap: 15px; }

        @media (max-width: 768px) { 
            .options-grid { grid-template-columns: 1fr; } 
            .quiz-header h2 { font-size: 18px; }
            .quiz-timer { font-size: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/courses.html" class="brand">
            <img src="كله بيتعلم (1).png" alt="شعار">
            <h1>كله بيتعلم</h1>
        </a>
        <a href="/courses.html" class="btn-back"><i class="fas fa-arrow-left"></i> العودة للكورسات</a>
    </header>

    <div class="quiz-container">
        <div class="quiz-card" id="main-quiz-card">
            <div class="loader-container" id="loader">
                <i class="fas fa-spinner fa-spin" style="font-size: 40px;"></i>
                <p>جاري تحميل الامتحان...</p>
            </div>

            <div id="quiz-ui" style="display: none; height: 100%; flex-direction: column;">
                <div class="quiz-header">
                    <h2>اختبار تأكيد الفهم</h2>
                    <div class="quiz-timer" id="timer-display"><i class="fas fa-clock"></i> <span id="time-text">00:00</span></div>
                </div>
                <div class="quiz-progress">
                    السؤال <span id="current-q-index">1</span> من <span id="total-q-count">10</span>
                </div>

                <div class="quiz-scroll-area">
                    <img id="q-img" src="" alt="سؤال الامتحان" class="question-image">
                    
                    <div class="options-grid">
                        <button class="opt-btn" id="btn-A" onclick="chooseAnswer('A')"><span class="letter">أ</span> <span id="txt-A"></span></button>
                        <button class="opt-btn" id="btn-B" onclick="chooseAnswer('B')"><span class="letter">ب</span> <span id="txt-B"></span></button>
                        <button class="opt-btn" id="btn-C" onclick="chooseAnswer('C')"><span class="letter">ج</span> <span id="txt-C"></span></button>
                        <button class="opt-btn" id="btn-D" onclick="chooseAnswer('D')"><span class="letter">د</span> <span id="txt-D"></span></button>
                    </div>
                </div>

                <div class="quiz-footer">
                    <button class="nav-btn" id="btn-prev" onclick="goPrev()"><i class="fas fa-arrow-right"></i> السابق</button>
                    <button class="submit-btn" id="btn-finish" onclick="finishQuiz()">إنهاء وتصحيح <i class="fas fa-check-circle"></i></button>
                    <button class="nav-btn" id="btn-next" onclick="goNext()">التالي <i class="fas fa-arrow-left"></i></button>
                </div>
            </div>

            <div class="result-screen" id="result-ui">
                <div class="result-circle" id="result-score-circle">0%</div>
                <div class="result-title" id="result-title">النتيجة</div>
                <div class="result-details" id="result-desc">أجبت على 0 من 0</div>
                <a href="/courses.html" class="btn-back" style="background: var(--primary); color: white; padding: 15px 30px; font-size: 18px;"><i class="fas fa-home"></i> العودة لقائمة الكورسات</a>
            </div>
        </div>
    </div>

    <script>
        const workerBaseUrl = 'https://kollobeit3alem.pages.dev';
        let quizQuestions = [];
        let userAnswers = {};
        let currentIndex = 0;
        let timeRemaining = 0;
        let timerInterval;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = '/';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const lessonId = urlParams.get('lesson_id');
            
            if (!lessonId) {
                document.getElementById('loader').innerHTML = '<i class="fas fa-exclamation-triangle" style="color:var(--danger); font-size: 50px;"></i><h3 style="color:var(--danger); margin-top:20px;">خطأ: لم يتم تحديد المحاضرة</h3>';
                return;
            }

            fetchQuizData(lessonId, token);
        });

        async function fetchQuizData(lessonId, token) {
            try {
                const response = await fetch(`${workerBaseUrl}/api/lessons/${lessonId}/quiz`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (Array.isArray(data) && data.length > 0) {
                    quizQuestions = data;
                    timeRemaining = quizQuestions.length * 60;
                    startExamUI();
                } else {
                    document.getElementById('loader').innerHTML = `
                        <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success); margin-bottom: 20px;"></i>
                        <h2 style="color: var(--text-main);">لا يوجد امتحان مخصص لهذه المحاضرة حالياً</h2>
                        <a href="/courses.html" class="btn-back" style="margin-top: 30px; background: var(--primary); color: white;">العودة للكورسات</a>
                    `;
                }
            } catch (error) {
                document.getElementById('loader').innerHTML = '<h3 style="color:var(--danger);">حدث خطأ في الاتصال بالسيرفر</h3>';
            }
        }

        function startExamUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'flex';
            document.getElementById('total-q-count').innerText = quizQuestions.length;
            
            renderCurrentQuestion();
            
            clearInterval(timerInterval);
            updateTimerUI();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerUI();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("انتهى وقت الامتحان سيتم التصحيح تلقائياً.");
                    finishQuiz();
                }
            }, 1000);
        }

        function updateTimerUI() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('time-text').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            if (timeRemaining < 30) {
                document.querySelector('.quiz-timer').style.backgroundColor = '#fef2f2';
                document.querySelector('.quiz-timer').style.color = '#ef4444';
            }
        }

        function renderCurrentQuestion() {
            const q = quizQuestions[currentIndex];
            document.getElementById('current-q-index').innerText = currentIndex + 1;
            
            document.getElementById('q-img').src = q.image_url;
            document.getElementById('txt-A').innerText = q.option_a;
            document.getElementById('txt-B').innerText = q.option_b;
            document.getElementById('txt-C').innerText = q.option_c;
            document.getElementById('txt-D').innerText = q.option_d;

            ['A','B','C','D'].forEach(opt => {
                const btn = document.getElementById(`btn-${opt}`);
                if (userAnswers[currentIndex] === opt) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });

            document.getElementById('btn-prev').disabled = (currentIndex === 0);
            
            if (currentIndex === quizQuestions.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-finish').style.display = 'flex';
            } else {
                document.getElementById('btn-next').style.display = 'flex';
                document.getElementById('btn-finish').style.display = 'none';
            }

            document.querySelector('.quiz-scroll-area').scrollTop = 0;
        }

        function chooseAnswer(opt) {
            userAnswers[currentIndex] = opt;
            renderCurrentQuestion();
        }

        function goNext() {
            if (currentIndex < quizQuestions.length - 1) {
                currentIndex++;
                renderCurrentQuestion();
            }
        }

        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentQuestion();
            }
        }

        function finishQuiz() {
            clearInterval(timerInterval);
            let score = 0;
            
            for (let i = 0; i < quizQuestions.length; i++) {
                if (userAnswers[i] === quizQuestions[i].correct_option) {
                    score++;
                }
            }

            const percentage = Math.round((score / quizQuestions.length) * 100);
            const isPassed = percentage >= 50;

            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'flex';

            const circle = document.getElementById('result-score-circle');
            const title = document.getElementById('result-title');
            
            circle.innerText = `${percentage}%`;
            document.getElementById('result-desc').innerText = `لقد أجبت بشكل صحيح على ${score} أسئلة من أصل ${quizQuestions.length}`;

            if (isPassed) {
                circle.className = 'result-circle pass';
                title.innerText = "تهانينا! لقد اجتزت الاختبار بنجاح";
                title.style.color = "var(--success)";
            } else {
                circle.className = 'result-circle fail';
                title.innerText = "لم تجتز الاختبار. يرجى المراجعة والمحاولة مجدداً";
                title.style.color = "var(--danger)";
            }
        }
    </script>
</body>
</html>
