<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشاهدة الدورة - كله بيتعلم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'AbdoLogo';
            src: url('alfont_com_Abdo.Fonts_Abdo.Logo_.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        :root {
            --primary-color: #015669; 
            --primary-light: rgba(1, 86, 105, 0.1);
            --bg-page: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --border: #e2e8f0;
            --radius: 20px;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'AbdoLogo', sans-serif !important; }

        body { background-color: var(--bg-page); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background-color: #ffffff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); z-index: 10; border-bottom: 3px solid var(--primary-color); }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 45px; border-radius: 10px; }
        .logo-area h1 { font-size: 22px; color: var(--primary-color); }
        .user-info { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--text-main); }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-color); }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        .video-section { flex: 1; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* === تعديل جذري لضمان أبعاد الفيديو 16:9 على كل الشاشات === */
        .video-wrapper { 
            background: #000; 
            border-radius: var(--radius); 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%;
            padding-bottom: 56.25%; /* نسبة 16:9 السحرية لليوتيوب */
        }
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #player { width: 100%; height: 100%; pointer-events: none; }
        .player-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 5; cursor: pointer; }

        .custom-controls { background: var(--bg-sidebar); padding: 20px; border-radius: var(--radius); margin-top: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .progress-container { width: 100%; height: 8px; background: var(--border); border-radius: 4px; position: relative; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.1s linear; }
        .controls-buttons { display: flex; justify-content: space-between; align-items: center; }
        .play-btn { background: var(--primary-color); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; }
        .play-btn:hover { transform: scale(1.05); }
        .time-display { font-size: 16px; font-weight: bold; color: var(--primary-color); }

        .lesson-info { margin-top: 20px; background: var(--bg-sidebar); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); position: relative;}
        .lesson-info h2 { font-size: 24px; color: var(--primary-color); margin-bottom: 10px; }
        
        .status-alert { margin-top: 15px; padding: 15px; border-radius: 10px; display: none; font-weight: bold; align-items: center; gap: 10px; }
        .status-alert.warning { background: #fef2f2; color: var(--danger); border: 1px solid #f87171; }
        
        /* زر دخول الامتحان */
        .btn-enter-exam {
            background: linear-gradient(135deg, var(--primary-color), #013d4a);
            color: white; border: none; padding: 12px 25px; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: none; align-items: center; gap: 10px; margin-top: 15px;
            box-shadow: 0 5px 15px rgba(1, 86, 105, 0.3); transition: 0.3s;
        }
        .btn-enter-exam:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(1, 86, 105, 0.4); }
        .btn-enter-exam.disabled { background: var(--text-sec); cursor: not-allowed; opacity: 0.7; transform: none; box-shadow: none;}

        .sidebar { width: 380px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.02); z-index: 5; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); background: var(--primary-light); }
        .sidebar-header h3 { color: var(--primary-color); font-size: 20px; }
        .playlist { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .lesson-item { padding: 15px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: all 0.3s; }
        .lesson-item:hover { border-color: var(--primary-color); transform: translateX(-5px); }
        .lesson-item.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .lesson-item.active .lesson-num { background: white; color: var(--primary-color); }
        .lesson-num { width: 35px; height: 35px; background: var(--primary-light); color: var(--primary-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; }

        /* === تصميم نافذة الامتحان المتطور (Multi-Question Quiz) === */
        .exam-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .exam-card { background: white; width: 95%; max-width: 800px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; max-height: 90vh; overflow: hidden;}
        
        .exam-header { background: var(--primary-light); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary-color); }
        .exam-header h3 { color: var(--primary-color); font-size: 22px; }
        .exam-timer { background: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; color: var(--danger); font-size: 18px; border: 2px solid var(--danger); display: flex; align-items: center; gap: 8px; }
        
        .exam-progress { padding: 15px 20px; font-size: 16px; font-weight: bold; color: var(--text-sec); border-bottom: 1px solid var(--border); text-align: center;}
        
        .exam-body { padding: 30px 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center;}
        .q-image { width: 100%; max-width: 500px; max-height: 300px; object-fit: contain; border-radius: 10px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px;}
        .opt-btn { background: var(--bg-page); border: 2px solid var(--border); padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; color: var(--text-main); text-align: right; }
        .opt-btn:hover { background: var(--primary-light); border-color: var(--primary-color); }
        .opt-btn.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); transform: scale(1.02); box-shadow: 0 5px 15px rgba(1,86,105,0.3);}
        
        .exam-footer { padding: 20px; background: var(--bg-page); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--text-main); display: flex; align-items: center; gap: 8px; transition: 0.3s;}
        .nav-btn:hover { background: var(--border); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .submit-exam-btn { background: var(--success); color: white; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; display: none; align-items: center; gap: 8px; }
        .submit-exam-btn:hover { background: #0ea5e9; }

        /* شاشة النتيجة */
        .result-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 50px 20px; text-align: center; }
        .result-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; margin-bottom: 20px; font-weight: bold; }
        .result-circle.pass { background: var(--success); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .result-circle.fail { background: var(--danger); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
        .result-msg { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .result-score { font-size: 18px; color: var(--text-sec); margin-bottom: 30px; }
        .btn-continue { background: var(--primary-color); color: white; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: 300px; border-right: none; border-top: 1px solid var(--border); }
            .q-options { grid-template-columns: 1fr; }
            .exam-header h3 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="كله بيتعلم (1).png" alt="شعار المنصة">
            <h1>كله بيتعلم</h1>
        </div>
        <div class="user-info" id="userInfo">
            <span id="userName">جاري التحميل...</span>
            <img src="" id="userAvatar" style="display:none;">
        </div>
    </header>

    <div class="main-container">
        <div class="video-section">
            
            <div class="video-wrapper" oncontextmenu="return false;">
                <div class="video-container" id="video-container">
                    <div id="player"></div>
                </div>
                <div class="player-overlay" id="player-overlay"></div>
            </div>

            <div class="custom-controls">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="controls-buttons">
                    <button class="play-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="duration-time">00:00</span>
                    </div>
                </div>
            </div>

            <div class="lesson-info">
                <h2 id="lesson-title">اختر درساً للبدء</h2>
                
                <div class="status-alert warning" id="cheat-alert">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>تنبيه: غير مسموح بتخطي أجزاء من الفيديو.</span>
                </div>

                <button class="btn-enter-exam disabled" id="start-exam-btn" onclick="startExam()">
                    <i class="fas fa-clipboard-list"></i> دخول امتحان المحاضرة
                </button>
                <p id="exam-hint" style="color: var(--danger); font-size: 13px; margin-top: 8px; display: none; font-weight: bold;">
                    *يجب إكمال مشاهدة الفيديو بالكامل لتفعيل زر الامتحان*
                </p>

            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <h3>محتوى الكورس</h3>
            </div>
            <div class="playlist" id="playlist-container"></div>
        </div>
    </div>

    <div class="exam-overlay" id="exam-overlay">
        <div class="exam-card">
            
            <div id="exam-quiz-ui">
                <div class="exam-header">
                    <h3>اختبار تأكيد الفهم</h3>
                    <div class="exam-timer" id="exam-timer"><i class="fas fa-clock"></i> <span>00:00</span></div>
                </div>
                <div class="exam-progress">السؤال <span id="current-q-num">1</span> من <span id="total-q-num">10</span></div>
                
                <div class="exam-body">
                    <img id="q-image" class="q-image" src="" alt="صورة السؤال">
                    <div class="q-options">
                        <button class="opt-btn" id="opt-A" onclick="selectOption('A')"></button>
                        <button class="opt-btn" id="opt-B" onclick="selectOption('B')"></button>
                        <button class="opt-btn" id="opt-C" onclick="selectOption('C')"></button>
                        <button class="opt-btn" id="opt-D" onclick="selectOption('D')"></button>
                    </div>
                </div>

                <div class="exam-footer">
                    <button class="nav-btn" id="btn-prev" onclick="prevQuestion()"><i class="fas fa-arrow-right"></i> السابق</button>
                    <button class="submit-exam-btn" id="btn-submit-exam" onclick="submitExam()">إنهاء وتصحيح <i class="fas fa-check-circle"></i></button>
                    <button class="nav-btn" id="btn-next" onclick="nextQuestion()">التالي <i class="fas fa-arrow-left"></i></button>
                </div>
            </div>

            <div class="result-screen" id="exam-result-screen">
                <div class="result-circle" id="result-circle"></div>
                <div class="result-msg" id="result-msg"></div>
                <div class="result-score" id="result-score"></div>
                <button class="btn-continue" onclick="closeExamAndSave()">متابعة الكورس</button>
            </div>

        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const workerBaseUrl = 'https://kollobeit3alem.pages.dev';
        
        let player;
        let lessonsData = [];
        let currentLessonIndex = 0;
        let isPlaying = false;
        
        let lastTime = 0;
        let duration = 0;
        let checkInterval;

        // متغيرات نظام الامتحان
        let quizQuestions = [];
        let userAnswers = {};
        let currentQIndex = 0;
        let examTimerInterval;
        let timeLeft = 0; // بالثواني

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('auth_token');
            const userInfoStr = localStorage.getItem('user_info');

            if (!token || !userInfoStr) { window.location.href = '/'; return; }

            const userInfo = JSON.parse(userInfoStr);
            document.getElementById('userName').innerText = userInfo.name;
            if(userInfo.avatar_url) {
                const img = document.getElementById('userAvatar');
                img.src = userInfo.avatar_url; img.style.display = 'block';
            }

            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('id') || 1; 

            await fetchLessons(courseId);
        });

        async function fetchLessons(courseId) {
            try {
                const response = await fetch(`${workerBaseUrl}/api/courses/${courseId}/lessons`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    lessonsData = data;
                    renderPlaylist();
                    loadVideo(0);
                } else {
                    document.getElementById('playlist-container').innerHTML = '<p style="text-align:center; padding: 20px;">لا توجد دروس متاحة حالياً.</p>';
                }
            } catch (error) { console.error(error); }
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            lessonsData.forEach((lesson, index) => {
                const div = document.createElement('div');
                div.className = `lesson-item ${index === currentLessonIndex ? 'active' : ''}`;
                div.innerHTML = `<div class="lesson-num">${index + 1}</div><div style="flex:1"><h4 style="font-size: 15px; margin-bottom: 5px;">${lesson.title}</h4></div>`;
                div.onclick = () => { loadVideo(index); };
                container.appendChild(div);
            });
        }

        async function loadVideo(index) {
            currentLessonIndex = index;
            const lesson = lessonsData[index];
            document.getElementById('lesson-title').innerText = lesson.title;
            renderPlaylist(); 

            const videoId = extractVideoID(lesson.video_url);

            lastTime = 0;
            document.getElementById('cheat-alert').style.display = 'none';
            document.getElementById('progress-bar').style.width = '0%';
            
            // إخفاء/تعطيل زر الامتحان حتى يتم جلب البيانات
            const examBtn = document.getElementById('start-exam-btn');
            const examHint = document.getElementById('exam-hint');
            examBtn.style.display = 'none';
            examBtn.classList.add('disabled');
            examHint.style.display = 'none';

            // جلب أسئلة الامتحان الخاص بالدرس
            fetchQuizForLesson(lesson.id);

            if (player) { player.loadVideoById(videoId); } 
            else {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0, 'showinfo': 0, 'iv_load_policy': 3 },
                    events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
                });
            }
        }

        function onPlayerReady(event) {
            duration = player.getDuration();
            updateTimeDisplay(0, duration);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                document.getElementById('play-pause-btn').innerHTML = '<i class="fas fa-pause"></i>';
                player.setPlaybackRate(1); 
                clearInterval(checkInterval);
                checkInterval = setInterval(monitorPlayback, 1000);
            } else {
                isPlaying = false;
                document.getElementById('play-pause-btn').innerHTML = '<i class="fas fa-play"></i>';
                clearInterval(checkInterval);

                if (event.data === YT.PlayerState.ENDED) {
                    handleVideoFinished();
                }
            }
        }

        function monitorPlayback() {
            if (!player || !isPlaying) return;
            const currentTime = player.getCurrentTime();
            duration = player.getDuration() || duration;

            if (player.getPlaybackRate() > 1) player.setPlaybackRate(1);

            if (currentTime > lastTime + 2) {
                player.seekTo(lastTime);
                document.getElementById('cheat-alert').style.display = 'flex';
                setTimeout(() => { document.getElementById('cheat-alert').style.display = 'none'; }, 4000);
            } else {
                lastTime = currentTime;
            }

            const percent = (currentTime / duration) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            updateTimeDisplay(currentTime, duration);
        }

        // ======================================
        // نظام الامتحانات المتطور (Multi-Question)
        // ======================================
        
        async function fetchQuizForLesson(lessonId) {
            quizQuestions = [];
            try {
                const response = await fetch(`${workerBaseUrl}/api/lessons/${lessonId}/quiz`);
                if(response.ok) {
                    const data = await response.json();
                    if(data && Array.isArray(data) && data.length > 0) {
                        quizQuestions = data;
                        // إظهار زر الامتحان لكن بشكل معطل مع تحذير
                        document.getElementById('start-exam-btn').style.display = 'inline-flex';
                        document.getElementById('exam-hint').style.display = 'block';
                    }
                }
            } catch(e) {}
        }

        function handleVideoFinished() {
            if (quizQuestions.length > 0) {
                // تفعيل زر الامتحان بمجرد انتهاء الفيديو
                const examBtn = document.getElementById('start-exam-btn');
                examBtn.classList.remove('disabled');
                document.getElementById('exam-hint').style.display = 'none';
                
                // تنبيه المستخدم
                alert("انتهى الفيديو! يرجى النقر على 'دخول امتحان المحاضرة' لاجتياز الاختبار.");
            } else {
                // لو مفيش امتحان، احفظ التقدم وافتح الدرس الجديد
                markLessonCompleted();
            }
        }

        function startExam() {
            if(document.getElementById('start-exam-btn').classList.contains('disabled')) {
                alert("يجب عليك إكمال مشاهدة الفيديو أولاً قبل دخول الامتحان!");
                return;
            }

            // إعادة ضبط الإعدادات
            userAnswers = {};
            currentQIndex = 0;
            
            // تحديد وقت الامتحان: دقيقة لكل سؤال
            timeLeft = quizQuestions.length * 60; 
            
            document.getElementById('total-q-num').innerText = quizQuestions.length;
            document.getElementById('exam-result-screen').style.display = 'none';
            document.getElementById('exam-quiz-ui').style.display = 'block';
            
            renderQuestion(currentQIndex);
            
            document.getElementById('exam-overlay').style.display = 'flex';
            
            // بدء العداد
            clearInterval(examTimerInterval);
            updateTimerDisplay();
            examTimerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) {
                    clearInterval(examTimerInterval);
                    alert("انتهى الوقت المخصص للامتحان!");
                    submitExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.querySelector('#exam-timer span').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            
            if(timeLeft < 30) {
                document.getElementById('exam-timer').style.backgroundColor = '#fef2f2';
            }
        }

        function renderQuestion(index) {
            const q = quizQuestions[index];
            document.getElementById('current-q-num').innerText = index + 1;
            
            document.getElementById('q-image').src = q.image_url;
            document.getElementById('opt-A').innerText = "أ) " + q.option_a;
            document.getElementById('opt-B').innerText = "ب) " + q.option_b;
            document.getElementById('opt-C').innerText = "ج) " + q.option_c;
            document.getElementById('opt-D').innerText = "د) " + q.option_d;

            // تحديد الاختيار لو الطالب كان مختاره قبل كده
            ['A','B','C','D'].forEach(opt => {
                const btn = document.getElementById(`opt-${opt}`);
                if(userAnswers[index] === opt) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });

            // التحكم في أزرار التنقل
            document.getElementById('btn-prev').disabled = (index === 0);
            
            if(index === quizQuestions.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-submit-exam').style.display = 'inline-flex';
            } else {
                document.getElementById('btn-next').style.display = 'inline-flex';
                document.getElementById('btn-submit-exam').style.display = 'none';
            }
        }

        function selectOption(opt) {
            userAnswers[currentQIndex] = opt;
            renderQuestion(currentQIndex); // لتحديث واجهة الاختيار (تلوين الزر)
        }

        function nextQuestion() {
            if(currentQIndex < quizQuestions.length - 1) {
                currentQIndex++;
                renderQuestion(currentQIndex);
            }
        }

        function prevQuestion() {
            if(currentQIndex > 0) {
                currentQIndex--;
                renderQuestion(currentQIndex);
            }
        }

        function submitExam() {
            clearInterval(examTimerInterval);
            
            // التصحيح التلقائي
            let score = 0;
            for(let i=0; i < quizQuestions.length; i++) {
                if(userAnswers[i] === quizQuestions[i].correct_option) {
                    score++;
                }
            }

            const percentage = (score / quizQuestions.length) * 100;
            const isPassed = percentage >= 50;

            // تحديث شاشة النتيجة
            document.getElementById('exam-quiz-ui').style.display = 'none';
            const resultScreen = document.getElementById('exam-result-screen');
            const circle = document.getElementById('result-circle');
            const msg = document.getElementById('result-msg');
            const scoreText = document.getElementById('result-score');

            circle.innerText = `${Math.round(percentage)}%`;
            scoreText.innerText = `أجبت بشكل صحيح على ${score} من أصل ${quizQuestions.length} أسئلة`;

            if(isPassed) {
                circle.className = 'result-circle pass';
                msg.innerText = "ممتاز! لقد اجتزت الاختبار بنجاح \uD83C\uDF89";
                msg.style.color = "var(--success)";
            } else {
                circle.className = 'result-circle fail';
                msg.innerText = "للأسف، لم تجتز الاختبار. يجب إعادة المحاولة.";
                msg.style.color = "var(--danger)";
            }

            resultScreen.style.display = 'flex';
            
            // إذا نجح، يحفظ التقدم في السيرفر
            if(isPassed) {
                markLessonCompleted();
            }
        }

        function closeExamAndSave() {
            document.getElementById('exam-overlay').style.display = 'none';
        }

        // ======================================
        // الاتصال بالسيرفر لحفظ التقدم
        // ======================================
        async function markLessonCompleted() {
            const lessonId = lessonsData[currentLessonIndex].id;
            const token = localStorage.getItem('auth_token');
            try {
                await fetch(`${workerBaseUrl}/api/progress`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ lessonId: lessonId })
                });
                
                // الانتقال التلقائي للدرس التالي لو متاح
                if(currentLessonIndex + 1 < lessonsData.length) {
                    loadVideo(currentLessonIndex + 1);
                } else {
                    // لو ده آخر درس في الكورس
                    if(!document.getElementById('exam-overlay').style.display || document.getElementById('exam-overlay').style.display === 'none') {
                        alert("مبروك! لقد أنهيت جميع محاضرات هذا الكورس بنجاح.");
                    }
                }
            } catch (error) { console.error(error); }
        }

        // تحكمات الفيديو
        document.getElementById('play-pause-btn').addEventListener('click', () => {
            if (!player) return;
            if (isPlaying) player.pauseVideo(); else player.playVideo();
        });
        document.getElementById('player-overlay').addEventListener('click', () => {
            if (!player) return;
            if (isPlaying) player.pauseVideo(); else player.playVideo();
        });
        function extractVideoID(url) {
            if (!url) return "";
            try {
                if (url.includes('v=')) return url.split('v=')[1].split('&')[0];
                if (url.includes('youtu.be/')) return url.split('youtu.be/')[1].split('?')[0];
            } catch(e) {}
            return url;
        }
        function updateTimeDisplay(current, dur) {
            document.getElementById('current-time').innerText = formatTime(current);
            document.getElementById('duration-time').innerText = formatTime(dur);
        }
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60);
            return `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }
    </script>
</body>
</html>
